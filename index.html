                type: "News",
                category: "校园新闻",
                content: `近日，长林河大学与海尔普斯集团 “海纳百川奖学金” 签约捐赠仪式在学校行政楼三楼会议室隆重举行。海尔普斯集团董事长王立、企业相关负责人，长林河大学副校长马丽霞、生物科技学院教授李三智及相关职能部门负责人、师生代表共同出席仪式，见证校企协同育人的重要时刻。\n\n仪式上，李三智首先致辞，对捐资助学的善举表示衷心感谢。他指出，此次奖学金的设立，是深化校企合作、汇聚社会力量助力人才培养的重要举措，将为学校品学兼优、志存高远的学子提供坚实的成长支撑，为培养具有家国情怀和实干本领的优秀人才注入强劲动力。\n\n在全体嘉宾的见证下，李三智教授与王立董事长共同签署奖学金捐赠协议，马丽霞副校长代表学校接受捐赠，并向集团颁发捐赠纪念证书。学生代表赵想在发言中表达了对捐赠企业和学校的诚挚谢意，承诺将珍惜这份荣誉与关怀，把资助转化为奋进动力，深耕专业学习、积极投身实践，以优异成绩回馈社会、传承爱心与责任。\n\n未来，双方将以奖学金为纽带，进一步拓展在人才培养、实践教学、科研合作等领域的深度协作，共同构建校企协同育人的良好生态，为教育事业发展和产业升级贡献更大力量。仪式在热烈的掌声中圆满落幕。`

        // --- Main App Container ---

        const App = () => {

                        </Modal>
                    )}

                    {openWindows.includes("student") && (
                        <Modal title="学生信息管理系统" onClose={() => closeApp("student")} width="w-3/4">
                            <StudentInfoApp isDeleted={studentDeleted} onDelete={() => setStudentDeleted(true)} />
                        </Modal>
                    )}

                    {openWindows.includes("access") && (
                        <Modal title="实验楼门禁记录" onClose={() => closeApp("access")}>
                            <AccessLogApp />
                        </Modal>
                    )}

                    {openWindows.includes("news") && (
                        <Modal title="校园资讯系统" onClose={() => closeApp("news")} width="w-3/4">
                            <NewsApp />
                        </Modal>
                    )}

                    {openWindows.includes("portal") && (
                        <div className="fixed inset-0 z-50 bg-black flex flex-col window-fade-enter-active">
                             {/* Full screen portal app mimicking a browser tab */}
                            <div className="bg-slate-200 h-8 flex items-center px-4 space-x-2 border-b border-slate-300">
                                <div className="flex space-x-1">
                                    <div className="w-3 h-3 rounded-full bg-red-500 cursor-pointer" onClick={() => closeApp("portal")}></div>
                                    <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                                    <div className="w-3 h-3 rounded-full bg-green-500"></div>
                                </div>
                                <div className="flex-1 bg-white mx-4 rounded text-xs text-center py-1 text-slate-500">
                                    portal.changlinhe.edu.cn
                                </div>
                            </div>
                            <div className="flex-1 overflow-hidden">
                                <PortalApp onClose={() => closeApp("portal")} />
                            </div>
                        </div>
                    )}
                    
                    {/* Urgent Notice Pop-up (After Login) */}
                    {showUrgentNotice && urgentNoticeData && (
                        <Modal 
                            title="长林河大学 紧急通知" 
                            onClose={() => setShowUrgentNotice(false)} 
                            width="w-2/5"
                        >
                            <UrgentNoticeContent 
                                notice={urgentNoticeData} 
                                onClose={() => setShowUrgentNotice(false)} 
                            />
                        </Modal>
                    )}
                </div>
            );
        };
        
        // --- Portal App (Unchanged Logic for Forum Sorting) ---

        const PortalApp = ({ onClose }) => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [portalTab, setPortalTab] = useState("forum"); // forum, email, end
            const [suspectName, setSuspectName] = useState("");
            const [gameResult, setGameResult] = useState(null); // success, fail

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === "liuhong20210261" && password === "A Brief History of Time") {
                    setIsLoggedIn(true);
                } else {
                    setError("用户名或密码错误。");
                }
            };

            const handleGuess = () => {
                if (suspectName.trim() === "李三智") {
                    setGameResult("success");
                } else {
                    setGameResult("fail");
                    setTimeout(() => setGameResult(null), 3000);
                }
            };

            if (gameResult === "success") {
                return (
                    <div className="h-full flex flex-col items-center justify-center bg-slate-900 text-center animate-in fade-in duration-1000">
                        <div className="text-6xl mb-6">🎉</div>
                        <h2 className="text-4xl font-bold text-green-400 mb-4">真相大白</h2>
                        <p className="text-xl text-slate-300 max-w-lg leading-relaxed">
                            你成功揭露了李三智利用职权压榨学生、学术造假及收受贿赂的罪行。
                            刘红虽然离开了，但她的勇气通过你的推理得以延续。
                        </p>
                        <div className="mt-8">
                            <button onClick={onClose} className="px-6 py-2 border border-slate-500 text-slate-400 hover:text-white hover:border-white transition-colors">
                                结束游戏
                            </button>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="h-full flex flex-col items-center justify-center bg-white text-slate-800">
                        <div className="w-80">
                            <h2 className="text-2xl font-bold text-blue-900 mb-6 text-center border-b pb-4">校园门户认证中心</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="text" 
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="学号/工号" 
                                    className="w-full p-2 border border-slate-300 rounded focus:border-blue-600 outline-none"
                                />
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="密码" 
                                    className="w-full p-2 border border-slate-300 rounded focus:border-blue-600 outline-none"
                                />
                                {error && <p className="text-red-500 text-xs">{error}</p>}
                                <button type="submit" className="w-full bg-blue-800 text-white py-2 rounded font-bold hover:bg-blue-700 transition-colors">登录</button>
                            </form>
                            <div className="mt-4 text-xs text-slate-400 text-center">
                                忘记密码请联系管理员重置
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col bg-slate-100 text-slate-800">
                    {/* Portal Header */}
                    <div className="bg-blue-900 text-white p-4 flex justify-between items-center shadow-md">
                        <div className="font-bold text-lg flex items-center space-x-2">
                            <Icons.Globe />
                            <span>校园智慧门户</span>
                        </div>
                        <div className="flex items-center space-x-4 text-sm">
                            <span>欢迎, 刘红 (20210261)</span>
                            <button onClick={() => setIsLoggedIn(false)} className="opacity-70 hover:opacity-100">退出</button>
                        </div>
                    </div>

                    {/* Portal Nav */}
                    <div className="bg-white border-b border-slate-200 flex p-2 space-x-2">
                        <button 
                            onClick={() => setPortalTab("forum")}
                            className={`px-4 py-2 rounded flex items-center space-x-2 ${portalTab === "forum" ? "bg-blue-100 text-blue-800 font-bold" : "text-slate-600 hover:bg-slate-50"}`}
                        >
                            <Icons.User /> <span>学生论坛</span>
                        </button>
                        <button 
                            onClick={() => setPortalTab("email")}
                            className={`px-4 py-2 rounded flex items-center space-x-2 ${portalTab === "email" ? "bg-blue-100 text-blue-800 font-bold" : "text-slate-600 hover:bg-slate-50"}`}
                        >
                            <Icons.Mail /> <span>我的信箱</span>
                        </button>
                    </div>

                    {/* Portal Content */}
                    <div className="flex-1 overflow-y-auto p-6 bg-slate-50 custom-scrollbar">
                        {gameResult === "fail" && (
                            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded shadow-lg animate-bounce z-50">
                                您的推理似乎有误，请重新查证。
                            </div>
                        )}

                        {portalTab === "forum" && (
                            <div className="space-y-6 max-w-3xl mx-auto">
                                {/* 论坛帖子排序：按日期降序，最新的在最前面 */}
                                {[...FORUM_POSTS].sort((a, b) => new Date(b.date) - new Date(a.date)).map(post => (
                                    <div key={post.id} className="bg-white p-6 rounded-lg shadow border border-slate-200">
                                        <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                                {post.isHot && <span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded font-bold">热</span>}
                                                {post.title}
                                            </h3>
                                            <span className="text-xs text-slate-400">{post.date} by {post.author}</span>
                                        </div>
                                        <p className="text-slate-700 mb-6 leading-relaxed">{post.content}</p>
                                        <div className="bg-slate-50 p-4 rounded-lg space-y-3">
                                            {post.comments.map((comment, idx) => (
                                                <div key={idx} className={`text-sm ${comment.isSystem ? "text-red-500 italic font-mono border border-red-200 bg-red-50 p-2" : ""}`}>
                                                    <span className="font-bold text-slate-600">{comment.author}: </span>
                                                    <span className="text-slate-600">{comment.content}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {portalTab === "email" && (
                            <div className="max-w-4xl mx-auto bg-white rounded-lg shadow h-full flex flex-col">
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                                    <span className="font-bold text-slate-700">已发送邮件</span>
                                    <span className="text-sm text-slate-500">共 1 封</span>
                                </div>
                                <div className="p-8 flex-1">
                                    <div className="border border-slate-200 rounded p-6 shadow-sm">
                                        <div className="mb-4 border-b pb-4">
                                            <p className="text-slate-500 text-sm">收件人：<span className="text-slate-800">教务处纪检组</span></p>
                                            <p className="text-slate-500 text-sm">时间：<span className="text-slate-800">2023年9月15日 14:28</span></p>
                                            <h3 className="font-bold text-xl mt-4">实名举报材料附件</h3>
                                        </div>
                                        <div className="prose prose-slate">
                                            <p>生物科技学院2021级学生刘红，学号20210261，实名举报本学院教授李三智存在学术造假、收受贿赂等行为。详细材料见附件。</p>
                                            <div className="mt-8 p-4 bg-yellow-50 border border-yellow-200 rounded text-yellow-800 flex items-center space-x-2 cursor-pointer hover:bg-yellow-100">
                                                <Icons.FileText />
                                                <span>evidence_package_20230915.zip (加密附件)</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Deduction Trigger */}
                                    <div className="mt-12 pt-8 border-t-2 border-slate-100">
                                        <div className="bg-slate-800 text-white p-6 rounded-lg shadow-xl">
                                            <h3 className="text-xl font-bold mb-2">🕵️‍♂️ 管理员系统提示</h3>
                                            <p className="mb-4 text-slate-300">通过阅读该邮件，您是否已经找出了真相，确定了造成刘红悲剧的关键嫌疑人？</p>
                                            <div className="flex space-x-2">
                                                <input 
                                                    type="text" 
                                                    value={suspectName}
                                                    onChange={(e) => setSuspectName(e.target.value)}
                                                    placeholder="请输入嫌疑人姓名"
                                                    className="flex-1 bg-slate-700 border border-slate-600 rounded px-4 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-blue-500"
                                                />
                                                <button 
                                                    onClick={handleGuess}
                                                    className="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded font-bold transition-colors"
                                                >
                                                    确认指认
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
